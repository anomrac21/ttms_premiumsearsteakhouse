theme = '_menus_ttms'
languageCode = 'en-tt'

# Mount theme's content (dashboard, locations, api, etc.); keep project content (defining mounts replaces default for that target)
[module]
  [[module.mounts]]
    source = "content"
    target = "content"
  [[module.mounts]]
    source = "themes/_menus_ttms/content"
    target = "content"
title = 'Premium Sear Steakhouse'
baseURL = 'https://premiumsearsteakhouse.ttmenus.com/'
enableRobotsTXT = true

[markup]

[markup.goldmark]

[markup.goldmark.parser]
      attribute = true

[markup.goldmark.renderer]
      unsafe = true

[outputFormats]

[outputFormats.menuitemsJSON]
    mediaType = "application/json"
    baseName = "menu-items"
    isPlainText = true
    notAlternative = true

[outputs]
  home = ["HTML", "JSON"]
  section = ["HTML", "JSON"]
  page = ["HTML", "JSON"]

[params]
  # Subscription tier: free | tier1 | tier1_4mo | tier2 (exported in /index.json for hub Account)
  tier = "tier2"
  description = "Premium SEAR Steakhouse — steaks, entrées, wines, cocktails and breakfast at Centre of Excellence, Macoya. View our menu and order online."
  authServiceUrl = "https://auth.ttmenus.com"
  adsServiceUrl = "https://ads.ttmenus.com"
  notifyServiceUrl = "https://notify.ttmenus.com"

[params.ads]
    clientId = "ttms_premiumsearsteakhouse"
    enabled = true
    apiUrl = "https://ads.ttmenus.com/api/v1"

[params.auth]
    enabled = true
    apiUrl = "https://auth.ttmenus.com/api/v1"

[params.contentManagement]
    enabled = true
    apiUrl = "https://cms.ttmenus.com/api"
    serviceUrl = "https://cms.ttmenus.com"
    clientId = "ttms_premiumsearsteakhouse"
    # For local development, use:
    # apiUrl = "http://localhost:8084/api"
    # serviceUrl = "http://localhost:8084"

# Dashboard update-ui still reads site.Params.content.*
[params.content]
    enabled = true
    apiUrl = "https://cms.ttmenus.com/api"
    clientId = "ttms_premiumsearsteakhouse"

# Thumbor — on-demand resized images for dashboard previews
[params.thumbor]
    enabled = true
    url = "https://thumbor.ttmenus.com"
    sourceBaseUrl = "https://premiumsearsteakhouse.ttmenus.com"
    menuImagesUseThumbor = true

# Menu Image Service - user-submitted images with admin approval
[params.menuImageService]
    enabled = true
    apiUrl = "https://menu-images.ttmenus.com/api/v1"

# Notification Service Configuration
[params.notifications]
    enabled = true
    apiUrl = "https://notify.ttmenus.com/api/v1"
    websocketUrl = "wss://notify.ttmenus.com/api/v1/ws/connect"
    serviceUrl = "https://notify.ttmenus.com"
  clientDomain = "premiumsearsteakhouse.ttmenus.com"

# Power-up flags surfaced in /index.json → TT Menus hub Account venue details
[params.features]
    payments = false
    delivery = false
    notifications = true
    analytics_access = true
    featured = true
    exclusive_ads = true
    no_competitor_ads = true
    unmetered_traffic = true

# POS: enabled + provider drive runtime (head.html) and hub Account (index.json features.pos / pos_provider)
[params.posintegration]
    enabled = false
    provider = ""
    api_url = ""
    access_token = ""
    store_id = ""
    sync_menu = false
    auto_process_orders = false
    fallback_to_whatsapp = true

[params.orderingsystem]
    # Set to false to disable placing orders (cart still works; user gets message and order is cancelled)
    enabled = true
    orderingDisabledMessage = "Ordering is not available for this menu at this time."
    vat = 0
    servicecharge = 0
    hastables = true
    usephonecall = false
    whatsapp = 18687207327
    phone = 18686158187

# Payment Service — menu checkout (enable when client is onboarded to pay subdomain)
[params.paymentService]
    enabled = false
    apiUrl = "https://pay.premiumsearsteakhouse.ttmenus.com"
    clientId = "ttms_premiumsearsteakhouse"
    currency = "TTD"
    provider = "wipay"

[params.services]
    analyticsid = 23
    notifications = true

[params.social]
    youtube = ""
    email = "admin@premiumsear.com"
    phone = 18686158187
    facebook = ""
    instagram = "https://www.instagram.com/premiumsearsteakhouse/"
    tiktok = ""

[privacy]

[privacy.instagram]
    simple = false
    disable = false

[taxonomies]
  ingredient = "ingredients"
  cookingmethod = "cookingmethods"
  tag = "tags"
  category = "categories"
  subcategory = "subcategories"
  type = "types"
  event = "events"
